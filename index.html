<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIG – Coordinate International Global</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a84c;--dark:#0a0e1a;--navy:#0d1b3e;}
body{font-family:'Segoe UI',sans-serif;color:#fff;background:var(--dark);overflow-x:hidden;}
html{scroll-behavior:smooth;}

/* LOADER */
.loader{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:#0a0e1a;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity 1s ease;
}
.loader span{
  color:var(--gold);
  font-size:1.5em;
  letter-spacing:0.3em;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

/* HERO */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;}

.hero-video{
  position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;
  opacity:0.75;z-index:0;
  transform:scale(1.05);
  animation:zoom 18s ease-in-out infinite alternate;
}
@keyframes zoom{from{transform:scale(1.05);}to{transform:scale(1.12);}}

.hero-overlay{
  position:absolute;width:100%;height:100%;z-index:1;
  background:
  radial-gradient(circle at 20% 30%, rgba(201,168,76,0.2), transparent 40%),
  radial-gradient(circle at 80% 70%, rgba(201,168,76,0.1), transparent 45%),
  linear-gradient(135deg, rgba(10,14,26,0.6), rgba(13,27,62,0.5));
}

.particles{position:absolute;width:100%;height:100%;z-index:1;pointer-events:none;}
.particles::before{
  content:"";position:absolute;width:200%;height:200%;
  background-image:radial-gradient(rgba(201,168,76,0.25) 1px, transparent 1px);
  background-size:120px 120px;
  animation:move 60s linear infinite;
}
@keyframes move{from{transform:translate(0,0);}to{transform:translate(-200px,-200px);}}

.hero-content{position:relative;z-index:2;transition:all 0.4s ease;}
.hero h2{text-shadow:0 4px 30px rgba(0,0,0,0.6);} 
.hero h2 span{text-shadow:0 0 25px rgba(201,168,76,0.4);} 

.film-grain{position:absolute;width:100%;height:100%;z-index:3;opacity:0.08;background:url("https://grainy-gradients.vercel.app/noise.svg");mix-blend-mode:overlay;pointer-events:none;}

/* SECTIONS */
section{padding:120px 40px;opacity:0;transform:translateY(40px);transition:all 1s ease;}
section.visible{opacity:1;transform:translateY(0);} 

/* MOUSE PARALLAX */
.parallax{transition:transform 0.2s ease-out;}

</style>
</head>
<body>

<div class="loader"><span>CIG</span></div>

<section class="hero">
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="hero-overlay"></div>
  <div class="particles"></div>

  <div class="hero-content parallax">
    <h2>Building Tomorrow's<br><span>Global Infrastructure</span></h2>
  </div>

  <div class="film-grain"></div>
</section>

<section><h2>Section Example 1</h2></section>
<section><h2>Section Example 2</h2></section>
<section><h2>Section Example 3</h2></section>

<script>
/* LOADER */
window.addEventListener("load",()=>{
  document.querySelector(".loader").style.opacity="0";
  setTimeout(()=>document.querySelector(".loader").style.display="none",1000);
});

/* SCROLL BLUR */
window.addEventListener("scroll",()=>{
  const hero=document.querySelector(".hero-content");
  let s=window.scrollY;
  hero.style.filter=`blur(${Math.min(s/120,6)}px)`;
  hero.style.opacity=Math.max(1-s/400,0);
});

/* SECTION FADE */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");}});
});
document.querySelectorAll("section").forEach(sec=>observer.observe(sec));

/* MOUSE PARALLAX */
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-0.5)*20;
  const y=(e.clientY/window.innerHeight-0.5)*20;
  document.querySelectorAll(".parallax").forEach(el=>{
    el.style.transform=`translate(${x}px,${y}px)`;
  });
});
</script>

</body>
</html>
