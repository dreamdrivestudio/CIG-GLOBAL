<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism – CIG</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0A0A0A;
  color:#fff;
}

.hero{
  height:60vh;
  background:url('images/zanzibar.jpg') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero h1{
  font-size:3em;
  background:linear-gradient(90deg,#D4AF37,#f5e070);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.content{
  padding:60px;
  max-width:900px;
  margin:auto;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:40px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 30px;
  border:1px solid #D4AF37;
  color:#D4AF37;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Tourism Projects</h1>
</div>

<div class="content">

<p>
CIG develops world-class tourism destinations across Zanzibar, Latin America, and emerging luxury markets.
</p>

<div class="gallery">
  <img src="images/zanzibar.jpg">
  <img src="images/zanzibar2.jpg">
  <img src="images/zanzibar3.jpg">
</div>

<a href="index.html" class="btn">← Back</a>

</div>

</body>
</html>
